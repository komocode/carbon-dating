<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #fff;
      width: 260px;
      padding: 16px;
    }
    h2 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    p.sub {
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 14px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    label:hover { background: #f1f3f4; }
    input[type="radio"] {
      accent-color: #1a73e8;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .provider-name {
      font-weight: 500;
      font-size: 13px;
    }
    .provider-url {
      font-size: 11px;
      color: #80868b;
    }
    .saved {
      display: none;
      font-size: 12px;
      color: #188038;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>Flight tracker</h2>
  <p class="sub">Preferred link out tracker.</p>

  <label>
    <input type="radio" name="provider" value="flightera">
    <span>
      <div class="provider-name">Flightera</div>
      <div class="provider-url">flightera.net</div>
    </span>
  </label>

  <label>
    <input type="radio" name="provider" value="flightradar24">
    <span>
      <div class="provider-name">Flightradar24</div>
      <div class="provider-url">flightradar24.com</div>
    </span>
  </label>

  <label>
    <input type="radio" name="provider" value="radarbox">
    <span>
      <div class="provider-name">RadarBox</div>
      <div class="provider-url">radarbox.com</div>
    </span>
  </label>

  <label>
    <input type="radio" name="provider" value="trip">
    <span>
      <div class="provider-name">Trip.com</div>
      <div class="provider-url">trip.com</div>
    </span>
  </label>

  <div class="saved" id="saved">Saved ✓</div>

  <script src="popup.js"></script>
</body>
</html>
